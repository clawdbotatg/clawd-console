<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=0.9" />
<title>clawd-console</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
  :root { --bg:#0c0c10; --panel:#14141b; --edge:#262633; --ink:#e6e6ee; --dim:#8a8aa0;
          --accent:#7c5cff; --user:#1f6feb; --tool:#7a5; --err:#e5534b; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
              font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  #app { display:flex; flex-direction:column; height:100%; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px;
           border-bottom:1px solid var(--edge); background:var(--panel); }
  header h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.3px; }
  header .meta { color:var(--dim); font-size:12px; font-family:ui-monospace,Menlo,monospace; }
  header .spacer { flex:1; }
  #dot { width:9px; height:9px; border-radius:50%; background:var(--err); flex:0 0 auto; }
  #dot.up { background:#3fb950; }
  #status { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--edge);
            color:var(--dim); white-space:nowrap; }
  #status.working { color:#f5d061; border-color:#5a4d1f; background:#1c180a; }
  #status.idle    { color:#3fb950; border-color:#1f5a2f; background:#0c1a10; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  #status.working { animation:pulse 1.1s ease-in-out infinite; }
  /* live "claude is thinking" row, pinned to the bottom of the transcript while a turn is in flight */
  .thinking { display:flex; align-items:center; gap:9px; padding:2px 4px;
              color:var(--dim); font-size:12px; font-family:ui-monospace,Menlo,monospace; }
  .thinking .spin { width:13px; height:13px; flex:none; border-radius:50%;
                    border:2px solid var(--edge); border-top-color:#f5d061;
                    animation:spin .8s linear infinite; }
  .thinking .lbl { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  main { flex:1; display:flex; min-height:0; }
  .col { display:flex; flex-direction:column; min-width:0; min-height:0; }
  #left  { flex:1; }
  #right { flex:1; background:#0a0a0e; }
  .col.hidden { display:none; }
  #term { flex:1; min-height:0; padding:6px 4px 0 8px; background:#000; }
  #feed { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
          padding:12px; display:flex; flex-direction:column; gap:10px;
          width:100%; max-width:860px; align-self:center; }
  .msg { border:1px solid var(--edge); border-radius:10px; padding:8px 11px; max-width:100%;
         white-space:pre-wrap; word-break:break-word; }
  .msg .who { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin-bottom:3px; }
  .msg.user      { border-color:#23406e; background:#0e1830; }
  .msg.assistant { border-color:#3a2f6b; background:#15122a; }
  .msg.tool      { border-color:#3a4a2a; background:#141a10; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .msg.tool_result { border-color:#333; background:#0f0f14; color:var(--dim);
                     font-family:ui-monospace,Menlo,monospace; font-size:12px; padding:0; }
  .msg.tool_result details { padding:0; }
  .msg.tool_result summary { cursor:pointer; padding:7px 11px; list-style:none;
                             color:var(--dim); user-select:none; }
  .msg.tool_result summary::-webkit-details-marker { display:none; }
  .msg.tool_result summary::before { content:"▸ "; color:#555; }
  .msg.tool_result details[open] summary::before { content:"▾ "; }
  .msg.tool_result summary:hover { color:var(--ink); }
  .msg.tool_result .result-body { padding:0 11px 9px; white-space:pre-wrap; word-break:break-word;
                                  max-height:280px; overflow:auto; border-top:1px solid #222; margin-top:2px; }
  .msg.result    { border-color:#444; background:#101016; color:var(--dim); font-size:12px; }
  .msg.cmd  { border-color:#3a3a52; background:#13131f; color:#b9b3e6;
              font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .msg.sys  { border-color:#333; background:#0f0f14; color:var(--dim); font-size:12px; font-style:italic; }
  /* rendered markdown inside bubbles */
  .md { white-space:normal; }
  .md p { margin:0 0 6px; }
  .md strong { color:#fff; font-weight:650; }
  .md em { font-style:italic; }
  .md a { color:#8aa9ff; }
  .md code { background:#000; border:1px solid var(--edge); border-radius:4px;
             padding:1px 4px; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .md pre { background:#000; border:1px solid var(--edge); border-radius:8px; padding:9px 11px;
            overflow:auto; max-height:300px; margin:6px 0; }
  .md pre code { background:none; border:0; padding:0; white-space:pre; }
  .msg .toolname { color:var(--tool); font-weight:600; }
  footer { border-top:1px solid var(--edge); background:var(--panel); padding:10px 12px;
           display:flex; flex-direction:column; gap:8px; }
  .inputrow { display:flex; gap:8px; align-items:flex-end; }
  #keys { display:flex; flex-wrap:wrap; gap:6px; }
  #keys button { background:#0a0a0e; border:1px solid var(--edge); color:var(--ink);
                 border-radius:7px; padding:7px 11px; font-size:13px; min-width:40px;
                 font-family:ui-monospace,Menlo,monospace; cursor:pointer; }
  #keys button:hover { border-color:var(--accent); }
  #keys button:active { background:var(--accent); }
  #attachments { display:flex; flex-wrap:wrap; gap:6px; }
  #attachments:empty { display:none; }
  .chip { display:flex; align-items:center; gap:6px; background:#0a0a0e; border:1px solid var(--edge);
          border-radius:8px; padding:4px 8px; font-size:12px; color:var(--ink); }
  .chip img { width:30px; height:30px; object-fit:cover; border-radius:4px; }
  .chip.up { color:var(--dim); font-style:italic; }
  .chip button { background:transparent; border:0; color:var(--dim); cursor:pointer; padding:0 2px;
                 font-weight:700; font-size:14px; }
  .chip button:hover { color:var(--err); }
  #box { flex:1; resize:none; min-height:38px; max-height:160px; background:#0a0a0e; color:var(--ink);
         border:1px solid var(--edge); border-radius:8px; padding:9px 11px; font:inherit; }
  /* iOS Safari auto-zooms on focus when the field's *visual* size is <16px. The page renders at
     initial-scale=0.9, so a 16px font is only ~14.4 visual px — still under the bar. 18px clears it
     (18*0.9≈16.2). Scoped to coarse pointers so the desktop input keeps its inherited size. */
  @media (pointer: coarse) { #box { font-size:18px; } }
  #box:focus { outline:none; border-color:var(--accent); }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:10px 16px;
           font-weight:600; cursor:pointer; }
  button:disabled { opacity:.4; cursor:default; }
  .hint { color:var(--dim); font-size:11px; padding:0 12px 8px; }
  #phoneBtn, #panelBtn { background:transparent; border:1px solid var(--edge); color:var(--dim);
              padding:5px 10px; font-size:12px; }
  #phoneBtn:hover, #panelBtn:hover { color:var(--ink); border-color:var(--accent); }
  #panelBtn.on { color:var(--accent); border-color:var(--accent); }
  #qrmodal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex;
             align-items:center; justify-content:center; z-index:50; }
  #qrmodal[hidden] { display:none; }
  .qrcard { background:var(--panel); border:1px solid var(--edge); border-radius:14px;
            padding:22px; text-align:center; max-width:340px; }
  #qrcode { background:#fff; padding:12px; border-radius:10px; display:inline-block; }
  #qrcode img, #qrcode canvas { display:block; }
  .qrurl { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--dim);
           margin:12px 0; word-break:break-all; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div id="dot"></div>
    <h1>clawd-console</h1>
    <span class="meta" id="meta">connecting…</span>
    <span class="spacer"></span>
    <button id="panelBtn" title="Show/hide the structured transcript">▤ transcript</button>
    <button id="phoneBtn" title="Open on your phone">📱 Phone</button>
    <span id="status">—</span>
  </header>
  <div id="qrmodal" hidden>
    <div class="qrcard">
      <div id="qrcode"></div>
      <div class="qrurl" id="qrurl"></div>
      <button id="qrclose">close</button>
    </div>
  </div>
  <main>
    <section class="col" id="left">
      <div id="term"></div>
    </section>
    <section class="col hidden" id="right">
      <div id="feed"></div>
    </section>
  </main>
  <footer>
    <div id="attachments"></div>
    <div id="keys" title="Send keys to the session (works even when the terminal is read-only) — for navigating TUI menus like /model">
      <button data-k="esc">esc</button>
      <button data-k="up">↑</button>
      <button data-k="down">↓</button>
      <button data-k="left">←</button>
      <button data-k="right">→</button>
      <button data-k="enter">⏎ enter</button>
      <button data-k="tab">⇥</button>
      <button data-k="ctrlc">⌃C</button>
    </div>
    <div class="inputrow">
      <textarea id="box" placeholder="message"></textarea>
      <button id="send">Send</button>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script>
// Touch devices (phones/tablets): make the terminal a read-only mirror. Mobile
// dictation/IME streams partial, self-revising text that xterm forwards as
// overlapping keystrokes ("thithis issthis is a…"), so all input goes through
// the message box (which gets native dictation/paste/image handling for free).
const isTouch = window.matchMedia('(pointer: coarse)').matches;
const term = new Terminal({
  fontFamily: 'ui-monospace, Menlo, Monaco, "Courier New", monospace',
  fontSize: 13, theme: { background: '#000000' }, cursorBlink: !isTouch,
  scrollback: 5000, disableStdin: isTouch,
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('term'));
fit.fit();

const dot = document.getElementById('dot');
const meta = document.getElementById('meta');
const statusEl = document.getElementById('status');
const feed = document.getElementById('feed');
const box = document.getElementById('box');
const sendBtn = document.getElementById('send');

let ws = null, decoder = new TextDecoder();

const token = new URLSearchParams(location.search).get('t') || '';

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?t=${encodeURIComponent(token)}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => { dot.classList.add('up'); sendResize(); };
  ws.onclose = () => { dot.classList.remove('up'); meta.textContent = 'reconnecting…';
                       setTimeout(connect, 1200); };
  ws.onmessage = (e) => {
    if (typeof e.data === 'string') { handleJson(JSON.parse(e.data)); }
    else { term.write(new Uint8Array(e.data), () => term.scrollToBottom()); }  // raw PTY bytes, pin to bottom
  };
}

function handleJson(m) {
  if (m.type === 'hello') {
    meta.textContent = '';
    setBusy(m.busy, null);
  } else if (m.type === 'transcript') {
    renderEvent(m.event, !m.history);   // live events type out; history replay renders instantly
  } else if (m.type === 'hook') {
    handleHook(m);
  } else if (m.type === 'exit') {
    hideThinking();
    meta.textContent = 'session ended';
    dot.classList.remove('up');
    statusEl.className = ''; statusEl.textContent = 'ended';
  }
}

function setBusy(busy, label) {
  if (busy) {
    statusEl.className = 'working';
    statusEl.textContent = label ? `working · ${label}` : 'working…';
    showThinking(label);
  } else {
    statusEl.className = 'idle';
    statusEl.textContent = 'idle · ready';
    hideThinking();
  }
}

// Live thinking indicator in the transcript: spinner + current activity + elapsed seconds,
// pinned to the bottom of the feed while a turn is in flight (mirrors the TUI's spinner).
let thinkEl = null, thinkTimer = null, thinkStart = 0, thinkLabel = '';
function showThinking(label) {
  thinkLabel = label || '';
  if (!thinkEl) {
    thinkEl = document.createElement('div');
    thinkEl.className = 'thinking';
    thinkEl.innerHTML = '<span class="spin"></span><span class="lbl"></span>';
    thinkStart = Date.now();
    thinkTimer = setInterval(paintThinking, 1000);
  }
  feed.appendChild(thinkEl);            // keep it the last child as new events arrive
  paintThinking();
  feed.scrollTop = feed.scrollHeight;
}
function paintThinking() {
  if (!thinkEl) return;
  const secs = Math.round((Date.now() - thinkStart) / 1000);
  const what = thinkLabel ? `running ${thinkLabel}` : 'thinking';
  thinkEl.querySelector('.lbl').textContent = `claude is ${what}… ${secs}s`;
}
function hideThinking() {
  if (thinkTimer) { clearInterval(thinkTimer); thinkTimer = null; }
  if (thinkEl) { thinkEl.remove(); thinkEl = null; }
}
function bumpThinking() { if (thinkEl) feed.appendChild(thinkEl); }  // re-pin below newest content

function handleHook(m) {
  const ev = m.event, d = m.data || {};
  const tool = d.tool || m.tool;
  if (ev === 'UserPromptSubmit') { setBusy(true, null); restoreViewAfterQuestion(); }
  else if (ev === 'PreToolUse')  {
    setBusy(true, tool);
    // these tools render an interactive prompt that only shows in the TUI
    if (tool === 'AskUserQuestion' || tool === 'ExitPlanMode') openTtyForQuestion();
    else restoreViewAfterQuestion();          // a normal tool starting = prior prompt was answered
  }
  else if (ev === 'PostToolUse') {
    setBusy(true, tool);
    if (tool === 'AskUserQuestion' || tool === 'ExitPlanMode') restoreViewAfterQuestion();
  }
  else if (ev === 'Stop')        { setBusy(false, null); restoreViewAfterQuestion(); }
  else if (ev === 'SessionStart') setBusy(false, null);
  else if (ev === 'SessionEnd')  { hideThinking(); statusEl.className=''; statusEl.textContent='session ended'; }
  else if (ev === 'Notification') {
    setBusy(m.busy, d.message ? d.message.slice(0,40) : null);
    openTtyForQuestion();                      // permission / "needs your input" — surface the TUI
  }
}

function bubble(cls, who, text, asMarkdown) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  const w = document.createElement('div'); w.className = 'who'; w.textContent = who;
  d.appendChild(w);
  const body = document.createElement('div');
  if (asMarkdown) { body.className = 'md'; body.innerHTML = mdToHtml(text); }
  else body.textContent = text;
  d.appendChild(body);
  feed.appendChild(d);
  bumpThinking();
  feed.scrollTop = feed.scrollHeight;
  return d;
}

// Typewriter reveal for live assistant prose — re-renders markdown of the
// growing prefix each tick so formatting (bold, code, lists) stays intact as it
// streams, mirroring the TUI. Step count is capped so long messages stay snappy.
// Only one types at a time; a new one instantly finalizes the previous.
let activeType = null;
function typeBubble(cls, who, text) {
  if (activeType) activeType.finish();
  const d = bubble(cls, who, '', true);
  const body = d.lastChild;
  const n = text.length;
  const steps = Math.min(70, Math.max(8, Math.ceil(n / 8)));
  let step = 0, done = false;
  const paint = (k) => { body.innerHTML = mdToHtml(text.slice(0, k)); bumpThinking(); feed.scrollTop = feed.scrollHeight; };
  const finish = () => {
    if (done) return; done = true;
    clearInterval(timer);
    body.innerHTML = mdToHtml(text);
    bumpThinking(); feed.scrollTop = feed.scrollHeight;
    if (activeType === handle) activeType = null;
  };
  const timer = setInterval(() => {
    step++;
    paint(Math.round(n * step / steps));
    if (step >= steps) finish();
  }, 22);
  const handle = { finish };
  activeType = handle;
}

// Minimal, XSS-safe markdown: escape first, then format a common subset.
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdToHtml(src) {
  const blocks = [], inline = [];
  const SB=String.fromCharCode(57344),SE=String.fromCharCode(57345),IB=String.fromCharCode(57346),IE=String.fromCharCode(57347);
  src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    blocks.push('<pre><code>' + escHtml(code.replace(/\n$/,'')) + '</code></pre>');
    return SB + (blocks.length - 1) + SE;
  });
  src = escHtml(src);
  src = src.replace(/`([^`]+)`/g, (m, c) => { inline.push('<code>' + c + '</code>'); return IB + (inline.length-1) + IE; });
  src = src.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  src = src.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  src = src.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  src = src.replace(/^#{1,6}\s+(.+)$/gm, '<strong>$1</strong>');
  src = src.replace(/^\s*[-*]\s+(.+)$/gm, '• $1');
  src = src.replace(/\n/g, '<br>');
  src = src.replace(new RegExp(IB+'(\\d+)'+IE,'g'), (m, i) => inline[+i]);
  src = src.replace(new RegExp(SB+'(\\d+)'+SE,'g'), (m, i) => blocks[+i]);
  return src;
}

// Tool results can be huge — collapse them into a dropdown, opened on demand.
function resultBubble(text) {
  text = String(text);
  const d = document.createElement('div');
  d.className = 'msg tool_result';
  const det = document.createElement('details');
  const sum = document.createElement('summary');
  const oneline = text.replace(/\s+/g, ' ').trim();
  const chars = text.length.toLocaleString();
  sum.textContent = `result · ${chars} chars` + (oneline ? ` — ${clip(oneline, 70)}` : '');
  det.appendChild(sum);
  const body = document.createElement('div');
  body.className = 'result-body';
  body.textContent = clip(text, 8000);
  det.appendChild(body);
  d.appendChild(det);
  feed.appendChild(d);
  bumpThinking();
  feed.scrollTop = feed.scrollHeight;
}

function renderEvent(ev, live) {
  if (ev.role === 'user') {
    bubble('user', 'you', ev.text, true);
  } else if (ev.role === 'command') {
    bubble('cmd', 'command', '⌘ ' + ev.text);
  } else if (ev.role === 'system') {
    bubble('sys', 'system', ev.text);
  } else if (ev.role === 'assistant') {
    if (ev.text) {
      if (live) typeBubble('assistant', 'claude', ev.text);
      else bubble('assistant', 'claude', ev.text, true);
    }
    (ev.tools || []).forEach(t => {
      const d = bubble('tool', 'tool', '');
      const body = d.lastChild;
      const nm = document.createElement('span'); nm.className = 'toolname'; nm.textContent = t.name;
      body.appendChild(nm);
      body.appendChild(document.createTextNode(' ' + summarizeInput(t.input)));
    });
  } else if (ev.role === 'tool_result') {
    (ev.results || []).forEach(r => resultBubble(r));
  } else if (ev.role === 'result') {
    const u = ev.usage || {};
    const tok = (u.input_tokens != null)
      ? ` · in ${u.input_tokens} / out ${u.output_tokens}` : '';
    bubble('result', 'turn complete',
      `${ev.subtype || ''}${ev.duration_ms ? ' · ' + Math.round(ev.duration_ms/1000) + 's' : ''}${tok}`);
  }
}

function summarizeInput(input) {
  if (input == null) return '';
  if (typeof input === 'string') return clip(input, 300);
  const keys = ['command','file_path','path','pattern','prompt','description','url','query'];
  for (const k of keys) if (input[k]) return clip(String(input[k]), 300);
  return clip(JSON.stringify(input), 300);
}
function clip(s, n) { s = String(s); return s.length > n ? s.slice(0, n) + '…' : s; }

// -- write channel ----------------------------------------------------------
function sendResize() {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'resize', cols: term.cols, rows: term.rows}));
}
// -- image attachments (paste / drop → upload → fold path into message) ------
let attachments = [];   // {path, name, url}
const attachEl = document.getElementById('attachments');

function renderChips() {
  attachEl.innerHTML = '';
  attachments.forEach((a, i) => {
    const c = document.createElement('div');
    c.className = 'chip' + (a.pending ? ' up' : '');
    if (a.url) { const im = document.createElement('img'); im.src = a.url; c.appendChild(im); }
    c.appendChild(document.createTextNode(a.pending ? 'uploading…' : a.name));
    if (!a.pending) {
      const x = document.createElement('button'); x.textContent = '✕';
      x.onclick = () => { attachments.splice(i, 1); renderChips(); };
      c.appendChild(x);
    }
    attachEl.appendChild(c);
  });
}

async function uploadImage(file) {
  const slot = { pending: true, url: URL.createObjectURL(file) };
  attachments.push(slot); renderChips();
  try {
    const res = await fetch(`/upload?t=${encodeURIComponent(token)}`, {
      method: 'POST', headers: { 'Content-Type': file.type || 'image/png' }, body: file });
    const j = await res.json();
    slot.pending = false; slot.path = j.path; slot.name = j.name;
  } catch (e) {
    attachments = attachments.filter(a => a !== slot);
  }
  renderChips();
}

function sendMessage() {
  const text = box.value.trim();
  const ready = attachments.filter(a => a.path);
  if ((!text && !ready.length) || !ws || ws.readyState !== 1) return;
  // claude reads each path via its Read tool → sees the image
  const full = [text, ...ready.map(a => a.path)].filter(Boolean).join(' ');
  ws.send(JSON.stringify({ type: 'send', text: full }));
  box.value = ''; attachments = []; renderChips();
}

box.addEventListener('paste', (e) => {
  const items = (e.clipboardData || {}).items || [];
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      const f = it.getAsFile(); if (f) { e.preventDefault(); uploadImage(f); }
    }
  }
});
['dragover', 'drop'].forEach(ev => document.addEventListener(ev, (e) => {
  if (ev === 'dragover') { e.preventDefault(); return; }
  e.preventDefault();
  for (const f of (e.dataTransfer?.files || [])) {
    if (f.type.startsWith('image/')) uploadImage(f);
  }
}));
sendBtn.onclick = sendMessage;
box.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
// Raw passthrough when the user types directly in the terminal (desktop only;
// the terminal is read-only on touch, so onData won't fire there).
term.onData(d => sendKeys(d));

// Control-key bar: send raw escape sequences straight to the PTY (bypasses
// xterm, so it drives TUI menus even on touch where the terminal is read-only).
const KEY_SEQ = {
  esc: '\x1b', up: '\x1b[A', down: '\x1b[B', right: '\x1b[C', left: '\x1b[D',
  enter: '\r', tab: '\t', ctrlc: '\x03',
};
function sendKeys(data) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'input', data }));
}
document.getElementById('keys').addEventListener('click', (e) => {
  const k = e.target.closest('button')?.dataset.k;
  if (k && KEY_SEQ[k] != null) { sendKeys(KEY_SEQ[k]); box.focus(); }
});

// -- view switcher: terminal (CLI) or transcript, one at a time ---------------
// Mobile defaults to the transcript (native scroll, markdown, no xterm pain);
// desktop defaults to the terminal. Drop to the tty only to get surgical.
const leftPanel = document.getElementById('left');
const rightPanel = document.getElementById('right');
const panelBtn = document.getElementById('panelBtn');
function setView(view) {
  const tty = view === 'tty';
  leftPanel.classList.toggle('hidden', !tty);
  rightPanel.classList.toggle('hidden', tty);
  document.getElementById('keys').style.display = tty ? '' : 'none';  // keys only drive the tty
  panelBtn.textContent = tty ? '▤ transcript' : '❯_ terminal';
  try { localStorage.setItem('cc_view', view); } catch {}
  if (tty) setTimeout(() => { fit.fit(); sendResize(); term.scrollToBottom(); }, 60);
  else feed.scrollTop = feed.scrollHeight;
}
panelBtn.onclick = () => setView(leftPanel.classList.contains('hidden') ? 'tty' : 'transcript');
setView(localStorage.getItem('cc_view') || (isTouch ? 'transcript' : 'tty'));

// Auto-surface the TUI when claude asks something interactive (AskUserQuestion,
// plan approval, permission prompt) — those render only in the terminal, so the
// transcript view would otherwise leave you not knowing. Restore the prior view
// once the prompt is answered. Skips work if you're already on the tty.
let viewBeforeQuestion = null;
function currentView() { return leftPanel.classList.contains('hidden') ? 'transcript' : 'tty'; }
function openTtyForQuestion() {
  if (currentView() === 'tty') return;
  if (viewBeforeQuestion === null) viewBeforeQuestion = currentView();
  setView('tty');
}
function restoreViewAfterQuestion() {
  if (viewBeforeQuestion === null) return;
  const v = viewBeforeQuestion; viewBeforeQuestion = null;
  setView(v);
}

// -- depth navigation: views are an ordered stack, shallow → deep. Swipe right
// climbs out (toward the menu); swipe left dives in (toward the tty), matching
// the iOS back-gesture feel. Today there are two rungs; when the menu screen
// lands, add it at the shallow end here — `unshift('menu')` — and teach setView
// to show it. The swipe wiring below keys off this array and needs no changes.
const LEVELS = ['transcript', 'tty'];
function stepLevel(dir) {
  const i = LEVELS.indexOf(currentView());
  if (i === -1) return;
  const next = LEVELS[Math.min(LEVELS.length - 1, Math.max(0, i + dir))];
  if (next !== currentView()) setView(next);
}
const goDeeper    = () => stepLevel(+1);   // swipe left
const goShallower = () => stepLevel(-1);   // swipe right

// Horizontal swipe on the stage switches depth. Listen in the capture phase so
// xterm (which handles its own touches on the tty view) can't swallow it.
// Vertical motion is left untouched so the transcript scrolls natively.
const stage = document.querySelector('main');
let swX = 0, swY = 0, swT = 0, swOn = false;
stage.addEventListener('touchstart', (e) => {
  swOn = e.touches.length === 1;
  if (!swOn) return;
  const t = e.touches[0]; swX = t.clientX; swY = t.clientY; swT = Date.now();
}, { capture: true, passive: true });
stage.addEventListener('touchend', (e) => {
  if (!swOn) return; swOn = false;
  const t = e.changedTouches[0];
  const dx = t.clientX - swX, dy = t.clientY - swY;
  if (Date.now() - swT > 800) return;                       // too slow for a flick
  if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.8) return;  // not a clean horizontal swipe
  if (dx < 0) goDeeper(); else goShallower();
}, { capture: true, passive: true });

window.addEventListener('resize', () => { fit.fit(); sendResize(); term.scrollToBottom(); });

// -- phone / QR --------------------------------------------------------------
const qrmodal = document.getElementById('qrmodal');
document.getElementById('phoneBtn').onclick = async () => {
  let url;
  try {
    const cfg = await (await fetch('/config')).json();
    url = `http://${cfg.lanIp}:${cfg.port}/?t=${encodeURIComponent(token)}`;
  } catch { url = location.href; }
  const holder = document.getElementById('qrcode');
  holder.innerHTML = '';
  new QRCode(holder, { text: url, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
  document.getElementById('qrurl').textContent = url;
  qrmodal.hidden = false;
};
document.getElementById('qrclose').onclick = () => { qrmodal.hidden = true; };
qrmodal.onclick = (e) => { if (e.target === qrmodal) qrmodal.hidden = true; };

connect();
</script>
</body>
</html>
